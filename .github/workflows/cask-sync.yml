name: Sync Homebrew Cask Data

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 6am UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run cask sync
        run: go run ./cmd/cask-sync

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet db/apps.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          title: "Auto-sync: Update database from Homebrew Cask"
          body: |
            Automated weekly sync of app data from Homebrew Cask API.

            This PR updates `db/apps.json` with:
            - New Homebrew cask names
            - New Sparkle feed URLs discovered from cask livecheck blocks
            - New lookup URLs for version checking

            Generated by `.github/workflows/cask-sync.yml`
          branch: auto/cask-sync
          commit-message: "db: auto-sync from Homebrew Cask API"
          delete-branch: true
